<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Art Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo-container logo-container--left">
            <h1 class="title">My Portfolio</h1>
        </div>
        <div class="title-dots"><span></span><span></span><span></span><span></span><span></span></div>
        
        <div class="profile-section">
            <div class="profile-pic-container" onclick="document.getElementById('profilePicInput').click()">
                <img src="" alt="Profile" class="profile-pic" id="profilePic">
                <div class="profile-pic-placeholder" id="profilePicPlaceholder">+</div>
            </div>
            <input type="file" id="profilePicInput" accept="image/*" hidden>
            
            <div class="profile-name-area">
                <span class="profile-name" id="profileName" onclick="toggleNameEdit()">Your Name</span>
            </div>
            <input type="text" class="profile-name-input" id="profileNameInput" placeholder="Enter your name" onblur="saveName()" onkeypress="if(event.key==='Enter') saveName()">
        </div>
    </header>

    <main class="main-content">
        <div class="portfolio-layout">
            <a href="add.html" class="add-portfolio-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                </svg>
                Add to Portfolio
            </a>

            <a href="create-board.html" class="add-portfolio-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                </svg>
                Create New Board
            </a>

            <div class="portfolio-content">
                <div class="boards-columns">
                    <div class="boards-sidebar" id="boardsColumn1"></div>
                    <div class="boards-sidebar" id="boardsColumn2"></div>
                </div>

                <div class="bio-area" id="bioArea">
                    <div class="bio-label">
                        <label>Bio</label>
                        <span class="bio-ellipsis" id="bioEllipsis" onclick="toggleBioEdit()">•••</span>
                    </div>
                    <div class="bio-text" id="bioText">
                        <span class="bio-placeholder">Write something about yourself...</span>
                    </div>
                    <textarea class="bio-textarea" id="bioTextarea" placeholder="Write something about yourself..." onblur="saveBio()"></textarea>
                </div>
            </div>

            <div class="waterfall-gallery" id="waterfallGallery"></div>
        </div>
    </main>

    <script>
        function toggleBioEdit() {
            var bioText = document.getElementById('bioText');
            var bioTextarea = document.getElementById('bioTextarea');
            bioText.style.display = 'none';
            bioTextarea.style.display = 'block';
            bioTextarea.focus();
        }

        function saveBio() {
            var bioText = document.getElementById('bioText');
            var bioTextarea = document.getElementById('bioTextarea');
            var bioEllipsis = document.getElementById('bioEllipsis');
            var bioPlaceholder = document.querySelector('.bio-placeholder');
            var value = bioTextarea.value.trim();
            if (value) {
                bioPlaceholder.textContent = value;
                bioPlaceholder.style.display = 'inline';
                bioEllipsis.style.display = 'inline';
                localStorage.setItem('portfolioBio', value);
            } else {
                bioPlaceholder.textContent = 'Write something about yourself...';
                bioPlaceholder.style.display = 'inline';
                bioEllipsis.style.display = 'inline';
            }
            bioTextarea.style.display = 'none';
            bioText.style.display = 'flex';
        }

        function loadBio() {
            var savedBio = localStorage.getItem('portfolioBio');
            if (savedBio) {
                var bioPlaceholder = document.querySelector('.bio-placeholder');
                bioPlaceholder.textContent = savedBio;
            }
        }

        function loadEntries() {
            var entries = JSON.parse(localStorage.getItem('portfolioEntries') || '[]');
            var gallery = document.getElementById('waterfallGallery');
            gallery.innerHTML = '';

            // Count entries per board
            var counts = {};

            for (var i = 0; i < entries.length; i++) {
                var entry = entries[i];
                var card = document.createElement('div');
                card.className = 'waterfall-card';
                card.onclick = (function(idx) {
                    return function() { window.location.href = 'entry.html?index=' + idx + '&from=portfolio'; };
                })(i);

                if (entry.image) {
                    card.innerHTML = '<img src="' + entry.image + '" alt="' + entry.title + '" class="waterfall-image">';
                }

                gallery.appendChild(card);

                counts[entry.board] = (counts[entry.board] || 0) + 1;
            }

            // Load custom boards
            loadCustomBoards(counts);
        }

        function loadCustomBoards(counts) {
            var boards = JSON.parse(localStorage.getItem('customBoards') || '[]');
            var col1 = document.getElementById('boardsColumn1');
            var col2 = document.getElementById('boardsColumn2');

            var col1Count = 0;

            for (var i = 0; i < boards.length; i++) {
                var board = boards[i];
                var count = counts[board.id] || 0;
                var card = document.createElement('a');
                card.href = 'board.html?id=' + board.id;
                card.className = 'board-card';
                card.innerHTML = '<h3 class="board-card-title">' + board.title + '</h3>' +
                                 '<p class="board-card-count">' + count + ' entries</p>';

                if (col1Count < 4) {
                    col1.appendChild(card);
                    col1Count++;
                } else {
                    col2.appendChild(card);
                }
            }

            // Hide column 2 if empty
            if (col2.children.length === 0) {
                col2.style.display = 'none';
            }
        }

        function ensureDefaultBoard() {
            var boards = JSON.parse(localStorage.getItem('customBoards') || '[]');
            var hasPortfolio = false;
            for (var i = 0; i < boards.length; i++) {
                if (boards[i].id === 'portfolio') {
                    hasPortfolio = true;
                    break;
                }
            }
            if (!hasPortfolio) {
                var defaultBoard = {
                    id: 'portfolio',
                    title: 'Portfolio',
                    tags: '',
                    thumbnail: null
                };
                boards.unshift(defaultBoard);
                localStorage.setItem('customBoards', JSON.stringify(boards));
            }
        }

        // Profile picture handling
        var profilePicInput = document.getElementById('profilePicInput');
        profilePicInput.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var size = 150;
                        var w = img.width;
                        var h = img.height;
                        var minDim = Math.min(w, h);
                        var sx = (w - minDim) / 2;
                        var sy = (h - minDim) / 2;
                        canvas.width = size;
                        canvas.height = size;
                        var ctx = canvas.getContext('2d');
                        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
                        var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        localStorage.setItem('profilePic', dataUrl);
                        document.getElementById('profilePic').src = dataUrl;
                        document.getElementById('profilePic').style.display = 'block';
                        document.getElementById('profilePicPlaceholder').style.display = 'none';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function loadProfilePic() {
            var savedPic = localStorage.getItem('profilePic');
            if (savedPic) {
                document.getElementById('profilePic').src = savedPic;
                document.getElementById('profilePic').style.display = 'block';
                document.getElementById('profilePicPlaceholder').style.display = 'none';
            }
        }

        // Name editing
        function toggleNameEdit() {
            var nameDisplay = document.getElementById('profileName');
            var nameInput = document.getElementById('profileNameInput');
            nameDisplay.style.display = 'none';
            nameInput.style.display = 'inline';
            nameInput.value = nameDisplay.textContent === 'Your Name' ? '' : nameDisplay.textContent;
            nameInput.focus();
        }

        function saveName() {
            var nameDisplay = document.getElementById('profileName');
            var nameInput = document.getElementById('profileNameInput');
            var value = nameInput.value.trim();
            if (value) {
                nameDisplay.textContent = value;
                localStorage.setItem('profileName', value);
            } else {
                nameDisplay.textContent = 'Your Name';
                localStorage.removeItem('profileName');
            }
            nameInput.style.display = 'none';
            nameDisplay.style.display = 'inline';
        }

        function loadProfileName() {
            var savedName = localStorage.getItem('profileName');
            if (savedName) {
                document.getElementById('profileName').textContent = savedName;
            }
        }

        ensureDefaultBoard();
        loadProfilePic();
        loadProfileName();
        loadBio();
        loadEntries();
    </script>

    <footer class="footer">
        <div class="footer-content">
            <a href="index.html" class="back-link">← Back</a>
            <p>&copy; 2026 Art Portfolio. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>

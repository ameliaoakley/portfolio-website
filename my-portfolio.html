<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Art Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo-container logo-container--left">
            <a href="index.html" class="back-link">← Back</a>
            <h1 class="title">My Portfolio</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="portfolio-layout">
            <div class="bio-section">
                <label for="bio">Bio</label>
                <textarea id="bio" placeholder="Write something about yourself..."></textarea>
            </div>

            <a href="add.html" class="add-card">
                <div class="add-card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                    </svg>
                </div>
                <h2 class="add-card-title">Add to Portfolio</h2>
                <p class="add-card-desc">Upload new artwork</p>
            </a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <a href="index.html" class="back-link">← Back</a>
            <p>&copy; 2026 Art Portfolio. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>

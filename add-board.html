<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Entry - Art Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo-container logo-container--left">
            <h1 class="title" id="pageTitle">Add Entry</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="upload-layout">
            <div class="upload-box">
                <svg viewBox="0 0 24 24" width="48" height="48">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                </svg>
                <input type="file" id="fileInput" accept="image/*" hidden>
                <button class="browse-btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
            </div>

            <div class="upload-fields">
                <div class="field-group">
                    <label for="title">Title of Work</label>
                    <input type="text" id="title" placeholder="Enter your artwork title">
                </div>

                <div class="field-group">
                    <label for="tags">Tags</label>
                    <input type="text" id="tags" placeholder="e.g., painting, abstract, digital">
                </div>

                <div class="field-group field-group--large">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Describe your artwork..."></textarea>
                </div>
            </div>
        </div>

        <div class="save-btn-container">
            <button class="save-btn" onclick="saveEntry()">Save Entry</button>
        </div>
            
    </main>

    <footer class="footer">
        <div class="footer-content">
            <a href="#" id="backLink" class="back-link">← Back</a>
            <p>&copy; 2026 Art Portfolio. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Get board id from URL
        var params = new URLSearchParams(window.location.search);
        var boardId = params.get('id');

        // Load custom board info
        var customBoards = JSON.parse(localStorage.getItem('customBoards') || '[]');
        var customBoard = null;
        for (var i = 0; i < customBoards.length; i++) {
            if (customBoards[i].id === boardId) {
                customBoard = customBoards[i];
                break;
            }
        }

        if (customBoard) {
            document.getElementById('pageTitle').textContent = 'Add Entry - ' + customBoard.title;
            document.title = 'Add Entry - ' + customBoard.title + ' - Art Portfolio';
            document.getElementById('backLink').href = 'board.html?id=' + boardId;
        }

        var fileInput = document.getElementById('fileInput');
        var uploadBox = document.querySelector('.upload-box');

        fileInput.addEventListener('change', function(e) {
            var files = e.target.files;
            if (files.length > 0) {
                displaySingleFile(files[0]);
            }
        });

        uploadBox.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadBox.style.borderColor = '#4ecdc4';
            uploadBox.style.background = 'rgba(78, 205, 196, 0.1)';
        });

        uploadBox.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadBox.style.borderColor = '';
            uploadBox.style.background = '';
        });

        uploadBox.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadBox.style.borderColor = '';
            uploadBox.style.background = '';
            var files = e.dataTransfer.files;
            if (files.length > 0) {
                displaySingleFile(files[0]);
            }
        });

        function displaySingleFile(file) {
            if (file.type.startsWith('image/')) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    uploadBox.innerHTML = '<img src="' + e.target.result + '" alt="Selected artwork" class="upload-preview-image" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px;">';
                    uploadBox.style.border = 'none';
                    uploadBox.style.background = 'rgba(255, 255, 255, 0.5)';
                    uploadBox.style.alignItems = 'center';
                    uploadBox.style.justifyContent = 'center';
                    uploadBox.style.overflow = 'hidden';
                    uploadBox.style.minHeight = '300px';
                };
                reader.readAsDataURL(file);
            }
        }

        function saveEntry() {
            var title = document.getElementById('title').value;
            var tags = document.getElementById('tags').value;
            var description = document.getElementById('description').value;

            if (!title) {
                alert('Please enter a title for your work.');
                return;
            }

            var previewImage = document.querySelector('.upload-preview-image');
            var imageData = previewImage ? previewImage.src : null;

            var entry = {
                title: title,
                tags: tags,
                description: description,
                board: boardId,
                image: imageData,
                date: new Date().toISOString()
            };

            var entries = JSON.parse(localStorage.getItem('portfolioEntries') || '[]');
            entries.push(entry);
            localStorage.setItem('portfolioEntries', JSON.stringify(entries));

            window.location.href = 'board.html?id=' + boardId;
        }
    </script>
</body>
</html>

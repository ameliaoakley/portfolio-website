<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <svg class="logo" viewBox="0 0 40 40" width="50" height="50">
                <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M12 28 C12 14, 28 14, 28 28" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="15" cy="20" r="2" fill="currentColor"/>
                <circle cx="25" cy="20" r="2" fill="currentColor"/>
            </svg>
            <h1 class="title">Art Portfolio</h1>
        </div>
        <p class="tagline">Showcase your creativity to the world</p>
    </header>

    <main class="main-content">
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
                <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            <input type="text" class="search-bar" placeholder="Search by tags (e.g., painting, digital art, photography...)">
        </div>

        <div class="nav-options">
            <a href="profiles.html" class="nav-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z" fill="currentColor"/>
                    </svg>
                </div>
                <h2 class="card-title">Profiles</h2>
                <p class="card-desc">Browse artist profiles and discover amazing work</p>
            </a>

            <a href="add.html" class="nav-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                    </svg>
                </div>
                <h2 class="card-title">Add to Portfolio</h2>
                <p class="card-desc">Upload and showcase your latest artwork</p>
            </a>

            <a href="about.html" class="nav-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="currentColor"/>
                    </svg>
                </div>
                <h2 class="card-title">About</h2>
                <p class="card-desc">Learn more about our platform and community</p>
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Art Portfolio. All rights reserved.</p>
    </footer>
</body>
</html>
